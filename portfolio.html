<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | yelab.log</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    /* PROJECT CARD */
    .project-card {
      border: .5px solid var(--border); border-radius: var(--radius);
      overflow: hidden; margin-bottom: 2rem; scroll-margin-top: 4rem;
    }
    .project-card:last-child { margin-bottom: 0; }
    .card-img-wrap { position: relative; width: 100%; aspect-ratio: 16/7; background: var(--accent-light); overflow: hidden; }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-img-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; color: var(--accent); font-size: 12px; opacity: .7;
    }
    .card-img-placeholder svg { width: 36px; height: 36px; }
    .card-body { padding: 1.25rem; }
    .card-header {
      display: flex; justify-content: space-between; align-items: baseline;
      flex-wrap: wrap; gap: 8px; margin-bottom: 5px;
    }
    .card-title  { font-size: 15px; font-weight: 700; line-height: 1.4; }
    .card-period {
      font-size: 11.5px; color: var(--text-2); background: var(--bg-2);
      border: .5px solid var(--border); padding: 2px 9px;
      border-radius: var(--pill); white-space: nowrap; flex-shrink: 0;
    }
    .card-org  { font-size: 12px; color: var(--accent); margin-bottom: 10px; font-weight: 700; }
    .card-desc { font-size: 13px; color: var(--text-2); line-height: 1.8; margin-bottom: 12px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }

    /* PAGE HEADER */
    .page-header { margin-bottom: 2.5rem; }
    .page-title  { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .page-sub    { font-size: 13px; color: var(--text-2); }

    .section { margin-bottom: 2.5rem; }

    @media (max-width: 560px) {
      .card-img-wrap { aspect-ratio: 16/9; }
    }
    @media print {
      .nav-links { display: none !important; }
      .project-card { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
<div class="page" id="app"></div>
<script src="./main.js"></script>
<script>
function render(d){
  applyTheme(d.theme);
  const pf = d.portfolio;

  const cardsHTML = pf.projects.map(p => `
    <div class="project-card" id="${esc(p.id)}">
      <div class="card-img-wrap">
        <img src="${esc(p.image)}" alt="${esc(p.title)}"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
        <div class="card-img-placeholder" style="display:none;">
          ${SVG.img}
          <span>이미지를 images/projects/ 폴더에 추가하세요</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-header">
          <span class="card-title">${esc(p.title)}</span>
          <span class="card-period">${esc(p.period)}</span>
        </div>
        <div class="card-org">${esc(p.org)}</div>
        <div class="card-desc">${esc(p.desc)}</div>
        <div class="card-tags">${p.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
      </div>
    </div>`).join('');

  document.getElementById('app').innerHTML = `
    ${navHTML(d.meta.siteName, 'Portfolio')}

    <div class="page-header">
      <h1 class="page-title">Portfolio</h1>
      <p class="page-sub">연구 프로젝트 상세 소개</p>
    </div>

    <section class="section">
      <div class="section-label">Projects</div>
      ${cardsHTML}
    </section>
  `;

  /* Home에서 앵커 링크로 넘어온 경우 해당 카드로 스크롤 */
  const hash = location.hash.slice(1);
  if (hash) {
    setTimeout(() => {
      const el = document.getElementById(hash);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

fetchData(render);
</script>
</body>
</html>
